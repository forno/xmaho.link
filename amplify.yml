version: 1
frontend:
  phases:
    preBuild:
      commands:
        - node -v
        - npm install -g pnpm
        - pnpm -v
        - pnpm install --frozen-lockfile
    build:
      commands:
        - pnpm generate
  artifacts:
    baseDirectory: .output/public
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
