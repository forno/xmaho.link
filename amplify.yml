version: 1
frontend:
  phases:
    preBuild:
      commands:
        - node -v
        - npm install -g pnpm
        - pnpm -v
        - pnpm install --frozen-lockfile
    build:
      commands:
        - pnpm exec nuxi build --preset static
  artifacts:
    baseDirectory: dist
    files:
      - '**/*'
